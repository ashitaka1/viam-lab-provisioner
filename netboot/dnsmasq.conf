# Proxy DHCP for PXE boot
# Responds only to PXE requests — does not assign IPs or interfere
# with existing DHCP servers on the network.

# Disable DNS (we only want DHCP proxy)
port=0

# Proxy DHCP on the local subnet
# Edit this to match your provisioning network
dhcp-range=10.1.0.0,proxy,255.255.240.0

# Tell PXE clients where to find the TFTP server and what to boot
pxe-service=x86-64_EFI,"Network Boot",netboot.xyz.efi
dhcp-boot=netboot.xyz.efi

# Logging
log-dhcp

# Proxy DHCP for PXE boot
# Responds only to PXE requests — does not assign IPs or interfere
# with existing DHCP servers on the network.

# Disable DNS (we only want DHCP proxy)
port=0

# Proxy DHCP on the local subnet
# Edit this to match your provisioning network
dhcp-range=10.1.0.0,proxy,255.255.240.0

# Serve GRUB EFI bootloader — loads grub.cfg from grub/ in the TFTP root,
# which boots the Ubuntu installer with autoinstall parameters.
dhcp-boot=grubx64.efi
pxe-service=x86-64_EFI,"Network Boot",grubx64.efi

# TFTP server — tftp-root is set via CLI flag in the Makefile
enable-tftp

# DHCP detail logging goes to log file (set via --log-facility in Makefile)
log-dhcp

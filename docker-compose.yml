services:
  http-server:
    build: ./http-server
    container_name: pxe-http
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8234}:8080"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./http-server/ubuntu:/srv/ubuntu:ro
      - ./http-server/autoinstall:/srv/autoinstall:ro
      - ./http-server/machines:/srv/machines:ro
      - ./http-server/scripts:/srv/scripts:ro
      - ./http-server/config:/srv/config:ro
